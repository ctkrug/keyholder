<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Keyholder — a private, if-something-happens-to-me checklist</title>
  <meta
    name="description"
    content="Fill in a checklist, watch it build live, export a PDF — 100% client-side. Nothing you type ever leaves your browser."
  />
  <link
    rel="icon"
    type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%238a2422'/%3E%3Ctext x='32' y='45' font-family='Georgia,serif' font-size='38' font-weight='700' fill='%23fffdf8' text-anchor='middle'%3EK%3C/text%3E%3C/svg%3E"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page">
    <header class="site-header">
      <p class="banner" role="status">
        <span class="banner__icon" aria-hidden="true">&#128274;</span>
        Nothing you type here is ever sent anywhere — this page makes zero network requests
        with your data. Open your browser's Network tab and check for yourself.
      </p>

      <h1 class="wordmark">
        <span class="wordmark__key">Key</span><svg
          class="wordmark__glyph"
          viewBox="0 0 24 24"
          aria-hidden="true"
          focusable="false"
        ><circle cx="7" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="2.1" /><path
          d="M9.8 9.8 19 19M15.6 15.6 17 14.2M17.6 17.6 19 16.2"
          fill="none"
          stroke="currentColor"
          stroke-width="2.1"
          stroke-linecap="round"
          stroke-linejoin="round"
        /></svg><span class="wordmark__holder">holder</span>
      </h1>
      <p class="tagline">A private checklist for the people you'd leave behind.</p>
    </header>

    <main class="layout">
      <section class="panel panel--form" aria-labelledby="form-heading">
        <h2 id="form-heading" class="sr-only">Checklist form</h2>
        <form id="checklist-form" class="checklist-form"></form>
        <div class="actions">
          <button id="export-pdf" type="button" class="btn btn--primary">
            Export PDF
          </button>
          <p id="export-status" class="status-line" role="status" aria-live="polite"></p>
        </div>
      </section>

      <section class="panel panel--preview" aria-labelledby="preview-heading">
        <h2 id="preview-heading" class="sr-only">Live preview</h2>
        <div id="preview" class="paper"></div>
      </section>
    </main>
  </div>

  <script src="vendor/jspdf.umd.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
